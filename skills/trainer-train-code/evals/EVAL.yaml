name: trainer-train-code
version: "1.0"
description: Evaluates the trainer-train-code skill

execution:
  target: default

tests:
  - id: initialize-code-workspace
    criteria: "The response must correctly initialize a code-target workspace, identify the trainable surface, and confirm the feedback signal before optimization begins."
    expected_output: "Derive the workspace from the filename, initialize `.trainer-workspace/classify/`, require the engineering review checkpoint, identify the classify function as a Trace bundle candidate, confirm pytest as the feedback signal, and initialize workflow-status.json."
    input: "Set up the trainer loop for `skills/trainer-optimize/scripts/config.py`. There's a pytest suite that covers it. How should the loop initialize the workspace and identify the trainable surface?"
    rubrics:
      - "Response identifies the Python function as a Trace bundle or node candidate"
      - "Response requires the engineering review checkpoint"
      - "Response confirms pytest as the feedback signal"
      - "Response mentions workflow-status.json initialization"

  - id: infer-judge-mode-code
    criteria: "The response must select custom scoring mode as default for code targets and explain the reasoning."
    expected_output: "Default to `custom` for code targets because executable test feedback is authoritative. An explicit row-level `scoring` field overrides this default."
    input: "My code optimization dataset rows have `expected` fields with exact test output strings. Should the trainer loop use exact-match, custom, or llm_judge mode?"
    rubrics:
      - "Response selects `custom` as the default for code targets"
      - "Response explains that deterministic test execution is the primary signal"
      - "Response notes that explicit `scoring` overrides inference"

  - id: missing-feedback-signal
    criteria: "The response must identify missing feedback signal as a blocker and provide actionable guidance."
    expected_output: "Treat the missing feedback signal as a blocker, stop optimization, and suggest creating a test suite, benchmark script, or deterministic evaluator."
    input: "I'm setting up the trainer loop for a code target but there's no test suite or benchmark script — just manual testing. How should the loop handle this?"
    rubrics:
      - "Response treats missing feedback signal as a blocker"
      - "Response stops optimization until a deterministic signal exists"
      - "Response suggests concrete options for creating a feedback signal"

  - id: write-back-checks-code
    criteria: "The response must enforce all code-specific write-back checks."
    expected_output: "Require test suite pass, confirm Trace imports explicit and no hidden dependencies added, confirm feedback signal still deterministically rerunnable, and require a written decision summary."
    input: "Before writing a trained candidate back to `skills/trainer-optimize/scripts/config.py`, what validation steps does the code trainer loop require?"
    rubrics:
      - "Response requires test suite to pass"
      - "Response checks Trace import integrity and no hidden dependencies"
      - "Response confirms feedback signal is deterministically rerunnable"
      - "Response requires a decision summary"
