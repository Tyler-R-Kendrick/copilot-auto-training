name: Refresh gh-aw workflow lockfiles

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-lockfiles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Ensure gh aw is available
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh aw --help >/dev/null 2>&1 || gh extension install github/gh-aw

      - name: Compile top-level gh-aw workflows
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mapfile -t workflows < <(find .github/workflows -maxdepth 1 -type f -name '*.md' -printf '%f\n' | sort)
          if [[ ${#workflows[@]} -eq 0 ]]; then
            echo "No top-level gh-aw workflows found."
            exit 0
          fi

          for workflow in "${workflows[@]}"; do
            echo "Compiling ${workflow}"
            gh aw compile "${workflow%.md}"
          done

      - name: Create pull request for regenerated lockfiles
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/refresh-gh-aw-workflow-lockfiles
          commit-message: "chore: refresh gh-aw workflow lockfiles"
          title: "Refresh gh-aw workflow lockfiles"
          body: |
            ## Summary
            - recompiled top-level gh-aw workflow markdown sources under `.github/workflows/`
            - updated checked-in `.lock.yml` files when compilation changed them

            ## Notes
            - generated by the manual `Refresh gh-aw workflow lockfiles` workflow
            - no pull request is created when compilation produces no repository diff
          delete-branch: true
