<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Repository Actions secrets navigation</title>
  <desc id="desc">Reference diagram showing the GitHub repository settings navigation path for Actions secrets: Settings, Secrets and variables, Actions.</desc>
  <rect width="980" height="420" fill="#0d1117"/>
  <rect x="40" y="40" width="320" height="320" rx="16" fill="#161b22" stroke="#30363d"/>
  <text x="64" y="92" fill="#f0f6fc" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Secrets and variables</text>
  <rect x="60" y="120" width="280" height="58" rx="10" fill="#1f6feb"/>
  <text x="92" y="156" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Actions</text>
  <text x="92" y="215" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="22">Codespaces</text>
  <text x="92" y="262" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="22">Dependabot</text>
  <rect x="410" y="58" width="520" height="304" rx="16" fill="#161b22" stroke="#30363d"/>
  <text x="442" y="104" fill="#f0f6fc" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Where to add workflow secrets</text>
  <text x="442" y="154" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="24">1. Open the repository's Settings tab.</text>
  <text x="442" y="198" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="24">2. In the left sidebar, open Secrets and variables.</text>
  <text x="442" y="242" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="24">3. Select Actions.</text>
  <text x="442" y="286" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="24">4. Create repository secrets such as</text>
  <text x="470" y="322" fill="#79c0ff" font-family="Courier New, monospace" font-size="24">COPILOT_GITHUB_TOKEN</text>
  <text x="734" y="322" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="24">and</text>
  <text x="798" y="322" fill="#79c0ff" font-family="Courier New, monospace" font-size="24">GH_AW_GITHUB_TOKEN</text>
</svg>
