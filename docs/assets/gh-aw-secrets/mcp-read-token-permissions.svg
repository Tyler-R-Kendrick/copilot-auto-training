<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Read-only PAT for GitHub MCP server</title>
  <desc id="desc">Reference diagram showing the minimal read-only repository permissions for a dedicated GH AW GitHub MCP server token.</desc>
  <rect width="980" height="520" fill="#0d1117"/>
  <rect x="40" y="40" width="900" height="440" rx="16" fill="#161b22" stroke="#30363d"/>
  <text x="70" y="94" fill="#f0f6fc" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Minimal PAT for GH_AW_GITHUB_MCP_SERVER_TOKEN</text>
  <text x="70" y="140" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="24">The current MCP server only enables these GitHub toolsets:</text>
  <text x="70" y="178" fill="#79c0ff" font-family="Courier New, monospace" font-size="24">context, repos, issues, pull_requests</text>
  <rect x="70" y="214" width="840" height="176" rx="12" fill="#0d1117" stroke="#30363d"/>
  <text x="96" y="258" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="22">Contents → Read</text>
  <text x="96" y="304" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="22">Pull requests → Read</text>
  <text x="96" y="350" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="22">Issues → Read</text>
  <text x="470" y="258" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="22">Needed for repository context and file reads</text>
  <text x="470" y="304" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="22">Needed for PR context lookup only</text>
  <text x="470" y="350" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="22">Needed for issue context lookup only</text>
  <text x="70" y="434" fill="#8b949e" font-family="Arial, Helvetica, sans-serif" font-size="20">If you later expand the MCP toolsets beyond these read-oriented capabilities, update the token permissions to match.</text>
</svg>
