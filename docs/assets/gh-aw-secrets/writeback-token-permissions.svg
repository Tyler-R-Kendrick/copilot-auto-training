<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">PAT permissions for GH AW write-back</title>
  <desc id="desc">Reference diagram showing the repository permissions required when a fine-grained token is used for GH AW pull request write-back and GitHub API access.</desc>
  <rect width="980" height="540" fill="#0d1117"/>
  <rect x="40" y="40" width="900" height="460" rx="16" fill="#161b22" stroke="#30363d"/>
  <text x="70" y="94" fill="#f0f6fc" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Repository permissions for write-back</text>
  <text x="70" y="140" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="24">Use these when one PAT also handles pull request creation or when populating</text>
  <text x="70" y="172" fill="#79c0ff" font-family="Courier New, monospace" font-size="24">GH_AW_GITHUB_TOKEN</text>
  <rect x="70" y="210" width="840" height="220" rx="12" fill="#0d1117" stroke="#30363d"/>
  <rect x="70" y="210" width="840" height="48" rx="12" fill="#21262d"/>
  <text x="96" y="242" fill="#f0f6fc" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Permission</text>
  <text x="420" y="242" fill="#f0f6fc" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Level</text>
  <text x="590" y="242" fill="#f0f6fc" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Why this repo needs it</text>
  <text x="96" y="302" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="22">Contents</text>
  <text x="420" y="302" fill="#79c0ff" font-family="Arial, Helvetica, sans-serif" font-size="22">Read and write</text>
  <text x="590" y="302" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="22">checkout, branch creation, and git push</text>
  <text x="96" y="352" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="22">Pull requests</text>
  <text x="420" y="352" fill="#79c0ff" font-family="Arial, Helvetica, sans-serif" font-size="22">Read and write</text>
  <text x="590" y="352" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="22">read PR context and create/update the PR</text>
  <text x="96" y="402" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="22">Issues</text>
  <text x="420" y="402" fill="#79c0ff" font-family="Arial, Helvetica, sans-serif" font-size="22">Read and write</text>
  <text x="590" y="402" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="22">issue reads plus issue fallback reporting</text>
  <text x="70" y="470" fill="#8b949e" font-family="Arial, Helvetica, sans-serif" font-size="20">Actions runtime and artifact uploads still use GitHub's built-in GITHUB_TOKEN, so no extra Actions or workflow PAT permission is needed here.</text>
</svg>
