[project]
name = "agent-skills"
version = "0.1.0"
description = "Local MCP server that exposes repository agent skills as tools and resources."
requires-python = ">=3.11"
dependencies = [
	"mcp[cli]>=1.8.0",
	"pyyaml>=6.0.0",
]

[project.scripts]
agent-skills-mcp = "server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
include = [
	"agent_skills_mcp.py",
	"server.py",
]

[tool.hatch.build.targets.wheel.force-include]
"../../skills/trainer-election/SKILL.md" = "skill_bundle/skills/trainer-election/SKILL.md"
"../../skills/trainer-election/assets" = "skill_bundle/skills/trainer-election/assets"
"../../skills/trainer-election/datasets" = "skill_bundle/skills/trainer-election/datasets"
"../../skills/trainer-election/evals" = "skill_bundle/skills/trainer-election/evals"
"../../skills/trainer-election/references" = "skill_bundle/skills/trainer-election/references"
"../../skills/trainer-election/scripts" = "skill_bundle/skills/trainer-election/scripts"
"../../skills/trainer-optimize/SKILL.md" = "skill_bundle/skills/trainer-optimize/SKILL.md"
"../../skills/trainer-optimize/assets" = "skill_bundle/skills/trainer-optimize/assets"
"../../skills/trainer-optimize/datasets" = "skill_bundle/skills/trainer-optimize/datasets"
"../../skills/trainer-optimize/evals" = "skill_bundle/skills/trainer-optimize/evals"
"../../skills/trainer-optimize/references" = "skill_bundle/skills/trainer-optimize/references"
"../../skills/trainer-optimize/scripts" = "skill_bundle/skills/trainer-optimize/scripts"
"../../skills/researcher-research/SKILL.md" = "skill_bundle/skills/researcher-research/SKILL.md"
"../../skills/researcher-research/assets" = "skill_bundle/skills/researcher-research/assets"
"../../skills/researcher-research/evals" = "skill_bundle/skills/researcher-research/evals"
"../../skills/researcher-research/references" = "skill_bundle/skills/researcher-research/references"
"../../skills/researcher-research/scripts" = "skill_bundle/skills/researcher-research/scripts"
"../../skills/trainer-synthesize/SKILL.md" = "skill_bundle/skills/trainer-synthesize/SKILL.md"
"../../skills/trainer-synthesize/assets" = "skill_bundle/skills/trainer-synthesize/assets"
"../../skills/trainer-synthesize/evals" = "skill_bundle/skills/trainer-synthesize/evals"
