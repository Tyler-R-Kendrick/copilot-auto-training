"../../skills/trainer-synthesize/scripts" = "skill_bundle/skills/trainer-synthesize/scripts"

[tool.hatch.build.targets.sdist]
include = [
	"agent_skills_mcp.py",
	"server.py",
	"pyproject.toml",
]

[tool.hatch.build.targets.sdist.force-include]
"../../skills/trainer-election/SKILL.md" = "skill_bundle/skills/trainer-election/SKILL.md"
"../../skills/trainer-election/assets" = "skill_bundle/skills/trainer-election/assets"
